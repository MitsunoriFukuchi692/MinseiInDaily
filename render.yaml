services:
  - type: web
    name: minsei-in-daily
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: LLM_PROVIDER
        value: openai
      - key: OPENAI_API_KEY
        sync: false
      # gemini / vertex に切り替える場合のみ設定
      - key: GEMINI_API_KEY
        sync: false
