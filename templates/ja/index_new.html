<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AIみまくん 介護支援ボット</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/care_new.css') }}">
</head>
<body>

  <!-- ヘッダー -->
  <header class="header">
    <div class="header-inner">
      <h1>🤖 AIみまくん <span>介護支援ボット</span></h1>
      <nav>
        <a href="/camera-test/" target="_blank">📷 カメラ</a>
      </nav>
    </div>
  </header>

  <main class="main">

    <!-- 言語選択（介護士の母国語を選ぶ） -->
    <div class="lang-bar">
      <span>介護士の言語：</span>
      <button class="lang-btn active" data-lang="ja">🇯🇵 日本語</button>
      <button class="lang-btn" data-lang="en">🇺🇸 English</button>
      <button class="lang-btn" data-lang="tl">🇵🇭 Filipino</button>
      <button class="lang-btn" data-lang="id">🇮🇩 Indonesia</button>
      <button class="lang-btn" data-lang="vi">🇻🇳 Tiếng Việt</button>
    </div>

    <!-- チャットウィンドウ -->
    <div class="chat-card">
      <div id="chat-window">
        <div class="welcome-msg">
          <p>👋 こんにちは！</p>
          <p>マイクボタンを押して話しかけてください。<br>会話を記録して日報を自動生成します。</p>
        </div>
      </div>
    </div>

    <!-- ルームID パネル -->
    <div class="input-card" id="room-card">
      <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
        <span style="font-weight:700; color:#555;">📡 2台接続：</span>
        <button class="send-btn caregiver-send" id="create-room-btn" onclick="createRoom()" style="padding:8px 18px;">部屋を作る</button>
        <span id="room-id-display" style="font-size:1.2rem; font-weight:700; color:#e53935; letter-spacing:4px;"></span>
        <span id="room-url-display" style="font-size:0.85rem; color:#888;"></span>
      </div>
    </div>

    <!-- 入力パネル：介護士専用 -->
    <div class="input-card">

      <!-- 大型マイクボタン + テキスト入力 -->
      <div class="mic-main-row">
        <button class="mic-main-btn" id="mic-caregiver-btn" onclick="startRecognition('caregiver-input', currentLang)" title="介護士の発言を音声入力">
          🎤
          <span class="mic-label">介護士</span>
        </button>
        <div class="input-inner">
          <input id="caregiver-input" type="text" placeholder="介護士の発言を入力（またはマイクで話す）..." autocomplete="off" />
          <button class="send-btn caregiver-send" onclick="sendMessage('caregiver')">送信</button>
        </div>
      </div>

      <!-- 被介護者発言（代理入力または2台接続時は自動表示） -->
      <div class="mic-main-row caree-row-style">
        <button class="mic-main-btn mic-caree" id="mic-caree-btn" onclick="startRecognition('caree-input', 'ja')" title="被介護者の発言を音声入力">
          🎤
          <span class="mic-label">被介護者</span>
        </button>
        <div class="input-inner">
          <input id="caree-input" type="text" placeholder="被介護者の発言を入力（代理入力）..." autocomplete="off" />
          <button class="send-btn caree-send" onclick="sendMessage('caree')">送信</button>
        </div>
      </div>

    </div>

    <!-- アクションボタン -->
    <div class="action-card">
      <button class="action-btn green-btn" id="template-btn">💬 テンプレート対話</button>
      <button class="action-btn blue-btn" id="translate-btn">🌐 翻訳して読み上げ</button>
      <button class="action-btn orange-btn" id="save-log-btn">💾 会話ログ保存</button>
      <button class="action-btn purple-btn" id="report-btn">📝 日報を生成</button>
    </div>

    <!-- テンプレートパネル（初期非表示） -->
    <div class="template-card" id="template-panel" style="display:none;">
      <h3>💬 テンプレート対話</h3>
      <div id="template-buttons"></div>
    </div>

    <!-- 翻訳パネル（初期非表示） -->
    <div class="translate-card" id="translate-panel" style="display:none;">
      <h3>🌐 翻訳して読み上げ</h3>
      <div class="translate-row">
        <select id="translate-direction">
          <option value="ja-en">日本語 → 英語</option>
          <option value="en-ja">英語 → 日本語</option>
          <option value="ja-tl">日本語 → Filipino</option>
          <option value="ja-id">日本語 → Indonesia</option>
          <option value="ja-vi">日本語 → Tiếng Việt</option>
        </select>
        <button class="action-btn blue-btn" id="do-translate-btn">翻訳する</button>
      </div>
      <div id="translation-result" class="translation-result"></div>
    </div>

    <!-- 日報プレビューパネル（初期非表示） -->
    <div class="report-card" id="report-panel" style="display:none;">
      <div class="report-header">
        <h3>📝 日報プレビュー</h3>
        <div class="report-actions">
          <button class="report-action-btn copy-btn" id="copy-report-btn">📋 コピー</button>
          <button class="report-action-btn dl-btn" id="dl-report-btn">⬇️ テキスト保存</button>
        </div>
      </div>
      <div id="report-loading" class="report-loading" style="display:none;">
        <span class="spinner"></span> 日報を生成中...
      </div>
      <div id="report-content" class="report-content"></div>
    </div>

  </main>

  <!-- 音声プレーヤー（非表示） -->
  <audio id="audio-player" style="display:none;"></audio>

  <script src="{{ url_for('static', filename='js/care_new.js') }}"></script>
</body>
</html>
