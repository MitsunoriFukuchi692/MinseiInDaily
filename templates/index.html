<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>民生委員 かんたん日報</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/minsei.css') }}">
</head>
<body>

  <!-- ヘッダー -->
  <header class="header">
    <div class="header-inner">
      <h1>📋 民生委員 かんたん日報</h1>
      <button class="logout-btn" id="logout-btn" style="display:none;" onclick="logout()">ログアウト</button>
    </div>
  </header>

  <main class="main">

    <!-- ======== 画面1: ログイン ======== -->
    <div id="screen-login" class="screen">
      <div class="login-card">
        <div class="login-icon">🏘️</div>
        <h2 class="login-title">ログイン</h2>
        <p class="login-sub">メールアドレスとパスワードを入力してください</p>

        <div class="form-group">
          <label class="form-label">メールアドレス</label>
          <input type="email" id="login-email" class="form-input" placeholder="example@city.lg.jp" autocomplete="email" />
        </div>
        <div class="form-group">
          <label class="form-label">パスワード</label>
          <input type="password" id="login-password" class="form-input" placeholder="パスワード" autocomplete="current-password" />
        </div>

        <div id="login-error" class="error-msg" style="display:none;"></div>

        <button class="big-btn green-btn" id="login-btn" onclick="doLogin()">
          ログイン
        </button>
        <p style="margin-top:12px; text-align:center; font-size:0.85rem;">
          <a href="#" onclick="doPasswordReset(); return false;" style="color:#4a7c59;">パスワードをお忘れの方</a>
        </p>
      </div>
    </div>

    <!-- ======== 画面2: 担当住民リスト ======== -->
    <div id="screen-residents" class="screen" style="display:none;">
      <div class="section-header">
        <h2>担当住民リスト</h2>
        <p class="section-sub" id="commissioner-name-display"></p>
      </div>

      <div id="residents-loading" class="loading-msg">
        <span class="spinner"></span> 住民リストを読み込み中...
      </div>

      <div id="residents-list"></div>

      <div id="residents-empty" class="empty-msg" style="display:none;">
        担当住民が登録されていません。<br>管理者にお問い合わせください。
      </div>
    </div>

    <!-- ======== 画面3: 音声録音 ======== -->
    <div id="screen-recording" class="screen" style="display:none;">
      <div class="back-row">
        <button class="back-btn" onclick="showScreen('residents')">← 住民リストへ戻る</button>
      </div>

      <div class="resident-badge" id="recording-resident-name"></div>
      <div class="visit-date" id="recording-date"></div>

      <!-- 大型マイクボタン -->
      <div class="mic-area">
        <button class="mic-big-btn" id="mic-btn" onclick="toggleMic()">
          <span class="mic-icon">🎤</span>
          <span class="mic-label" id="mic-label">タップして録音開始</span>
        </button>
        <div class="mic-status" id="mic-status"></div>
      </div>

      <!-- テンプレート対話 -->
      <div class="template-section">
        <div class="template-header">
          <span class="template-title">📋 テンプレート入力</span>
          <span class="template-hint">タップで追記</span>
        </div>
        <div class="template-tabs">
          <button class="tmpl-tab active" onclick="switchTab('anzen', this)">安否確認</button>
          <button class="tmpl-tab" onclick="switchTab('taichou', this)">体調確認</button>
          <button class="tmpl-tab" onclick="switchTab('seikatsu', this)">生活状況</button>
        </div>
        <div id="tmpl-anzen" class="template-items">
          <button class="tmpl-item" onclick="appendTemplate('在宅確認済み')">在宅確認済み</button>
          <button class="tmpl-item" onclick="appendTemplate('応答あり・元気な様子')">応答あり・元気な様子</button>
          <button class="tmpl-item" onclick="appendTemplate('応答あったが体調不良気味')">応答あったが体調不良気味</button>
          <button class="tmpl-item" onclick="appendTemplate('応答なし・後日再訪予定')">応答なし・後日再訪予定</button>
          <button class="tmpl-item" onclick="appendTemplate('緊急連絡が必要な状態')">緊急連絡が必要な状態</button>
        </div>
        <div id="tmpl-taichou" class="template-items" style="display:none;">
          <button class="tmpl-item" onclick="appendTemplate('体調良好')">体調良好</button>
          <button class="tmpl-item" onclick="appendTemplate('食欲あり・食事できている')">食欲あり・食事できている</button>
          <button class="tmpl-item" onclick="appendTemplate('軽い体調不良（頭痛・疲労感）')">軽い体調不良（頭痛・疲労感）</button>
          <button class="tmpl-item" onclick="appendTemplate('発熱・体調悪化あり')">発熱・体調悪化あり</button>
          <button class="tmpl-item" onclick="appendTemplate('通院・服薬継続中')">通院・服薬継続中</button>
        </div>
        <div id="tmpl-seikatsu" class="template-items" style="display:none;">
          <button class="tmpl-item" onclick="appendTemplate('自立して生活できている')">自立して生活できている</button>
          <button class="tmpl-item" onclick="appendTemplate('買い物・家事に支障なし')">買い物・家事に支障なし</button>
          <button class="tmpl-item" onclick="appendTemplate('買い物・家事に困っている')">買い物・家事に困っている</button>
          <button class="tmpl-item" onclick="appendTemplate('話し相手・孤独感あり')">話し相手・孤独感あり</button>
          <button class="tmpl-item" onclick="appendTemplate('介護サービス利用中')">介護サービス利用中</button>
        </div>
      </div>

      <!-- 録音テキスト表示 -->
      <div class="voice-card" id="voice-card" style="display:none;">
        <div class="voice-card-header">
          <span class="voice-card-title">📝 録音内容</span>
          <div class="voice-card-actions">
            <button class="tts-btn" id="tts-voice-btn" onclick="speakVoiceText()">🔊 読み上げ</button>
            <button class="clear-btn" onclick="clearVoice()">クリア</button>
          </div>
        </div>
        <textarea id="voice-text" class="voice-textarea" placeholder="録音内容がここに表示されます。手入力で修正もできます。"></textarea>
      </div>

      <!-- 日報生成ボタン -->
      <button class="big-btn purple-btn" id="generate-btn" onclick="generateReport()" style="display:none;">
        📋 AI日報を生成する
      </button>
    </div>

    <!-- ======== 画面4: 日報プレビュー ======== -->
    <div id="screen-report" class="screen" style="display:none;">
      <div class="back-row">
        <button class="back-btn" onclick="showScreen('recording')">← 録音画面へ戻る</button>
      </div>

      <div class="report-title-row">
        <div class="report-title-line">
          <h2>📋 訪問日報</h2>
          <button class="tts-btn" id="tts-report-btn" onclick="speakReport()">🔊 読み上げ</button>
        </div>
        <div class="report-meta" id="report-meta"></div>
      </div>

      <div id="report-loading" class="loading-msg" style="display:none;">
        <span class="spinner"></span> AI日報を生成中...
      </div>

      <div class="report-card" id="report-card" style="display:none;">
        <textarea id="report-content" class="report-textarea"></textarea>
      </div>

      <!-- アクションボタン -->
      <div class="report-actions" id="report-actions" style="display:none;">
        <button class="big-btn green-btn" onclick="saveReport()">
          💾 保存する
        </button>
        <button class="big-btn blue-btn" onclick="downloadReport()">
          ⬇️ テキスト保存
        </button>
        <button class="big-btn gray-btn" onclick="copyReport()">
          📋 コピー
        </button>
      </div>

      <div id="save-status" class="save-status" style="display:none;"></div>
    </div>

  </main>

  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.js"></script>
  <script>
    // Supabase設定（Flaskから埋め込み）
    const SUPABASE_URL = "{{ supabase_url }}";
    const SUPABASE_KEY = "{{ supabase_key }}";
  </script>
  <script src="{{ url_for('static', filename='js/minsei.js') }}"></script>
</body>
</html>
